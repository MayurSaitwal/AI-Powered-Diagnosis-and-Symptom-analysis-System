<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ==================================================
   Refined professional stylesheet — no Bootstrap used
   Clean, spacious, hospital-style UI with accessible contrast
   ================================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

:root {
  --bg: #f6f9fb;
  --surface: #ffffff;
  --primary: #0b66c2;    /* trusted blue */
  --accent: #0ca8a8;     /* soothing teal */
  --muted: #6b7280;
  --text: #0f1724;
  --success: #16a34a;
  --warning: #f59e0b;
  --danger: #dc2626;
  --radius: 12px;
  --shadow-soft: 0 12px 36px rgba(15,23,42,0.06);
  --shadow-subtle: 0 6px 20px rgba(15,23,42,0.04);
  --max-width: 1140px;
  --gap: 1.25rem;
}

/* --------------------
   Base / Reset
   -------------------- */
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  line-height:1.6;
  font-size:16px;
}

a{color:var(--primary); text-decoration:none}
a:focus,a:hover{ text-decoration:underline }
img{max-width:100%;height:auto;display:block}

/* --------------------
   Layout helpers
   -------------------- */
.container{max-width:var(--max-width);margin:0 auto;padding:0 var(--gap)}
.row{display:flex;flex-wrap:wrap;gap:var(--gap)}
.col{flex:1;min-width:0}
.col-6{flex-basis:50%}
.col-md-4{flex-basis:33.333%}
.col-md-3{flex-basis:25%}
@media (max-width:900px){.col-6,.col-md-4,.col-md-3{flex-basis:100%}}

/* --------------------
   Header / nav
   -------------------- */
.site-header{background:var(--surface);box-shadow:var(--shadow-subtle);position:sticky;top:0;z-index:40}
.site-header .container{display:flex;align-items:center;justify-content:space-between;padding:1rem 0}
.navbar-brand{font-weight:700;color:var(--primary);font-size:1.05rem}
.nav-links{display:flex;gap:1rem;align-items:center}
.nav-links a{color:#314155;padding:0.35rem 0.6rem;border-radius:8px;font-weight:600}
.nav-links a:hover{background:rgba(11,102,194,0.06);color:var(--primary)}
.actions{display:flex;align-items:center}
.btn-cta{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;padding:0.6rem 1rem;border-radius:10px;font-weight:700;box-shadow:var(--shadow-soft);border:0}
    </style>
</head>
<body>
    <header class="site-header sticky-top bg-white shadow-sm">
            <nav class="container" aria-label="Main navigation">
                <div class="brand-area">
                    <a class="navbar-brand" href="{{ url_for('home') }}">AI Medical Triage</a>
                </div>

                <div class="nav-links">
                    <a href="{{ url_for('home') }}">Home</a>
                    <a href="{{ url_for('how_it_works') }}">How It Works</a>
                    <a href="{{ url_for('about') }}">About</a>
                    <a href="{{ url_for('disclaimer') }}">Disclaimer</a>
                    <a href="{{ url_for('contact') }}">Contact</a>
                </div>

                <div class="actions">
                    <a class="btn-cta" href="{{ url_for('symptom_form') }}">Get Started</a>
                </div>
            </nav>
        </header> 
</body>
</html>
