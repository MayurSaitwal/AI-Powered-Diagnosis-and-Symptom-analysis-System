<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Complete</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,700&display=swap");

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Sora", "Segoe UI", sans-serif;
            color: #0f172a;
            background:
                radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 45%),
                radial-gradient(circle at 80% 20%, #ccfbf1 0%, transparent 45%),
                linear-gradient(135deg, #f8fafc 0%, #fff7ed 100%);
            padding: 16px;
        }

        .card {
            width: min(620px, 100%);
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 20px 55px rgba(15, 23, 42, 0.14);
            text-align: center;
        }

        .kicker {
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #0f766e;
            font-size: 0.76rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-family: "Fraunces", serif;
            font-size: 2rem;
        }

        p {
            margin-top: 10px;
            color: #475569;
            line-height: 1.6;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 11px 16px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(120deg, #0f766e, #1d4ed8);
        }

        .btn-secondary {
            color: #0f172a;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body>
    <section class="card">
        <div class="kicker">Registration Finished</div>
        <h1>Welcome, {{ view }}</h1>
        <p>Your profile has been created successfully. You can now sign in to start symptom-based analysis and access your dashboard experience.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/login">Go to Login</a>
            <a class="btn btn-secondary" href="/home">Back to Home</a>
        </div>
    </section>
</body>
</html>
